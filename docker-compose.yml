services:
  clawgraph:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
        required: false

  # Local Neo4j for development (activate with: docker compose --profile dev up)
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: [ "CMD", "neo4j", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ "dev" ]

volumes:
  neo4j_data:
